name: Refresh News Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh trend data if stale
        run: node scripts/refresh-trend-topics-if-stale.mjs

      - name: Commit updated JSON
        run: |
          if git diff --quiet -- data/trend-topics.json data/trend-topics-archive.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trend-topics.json data/trend-topics-archive.json
          git commit -m "chore: refresh trend data"
          git push
