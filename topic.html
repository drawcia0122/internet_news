<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="INTERNET NEWS の話題詳細ページ。1つのトピックを独立して深掘りできます。" />
    <title>INTERNET NEWS | 話題詳細</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <main class="topic-page">
      <a class="topic-back-link" href="./index.html#trends">← トレンド一覧に戻る</a>
      <section class="topic-hero">
        <p class="section-kicker" id="topic-kicker">TREND DETAIL</p>
        <h1 id="topic-title">話題を読み込み中です</h1>
        <p class="topic-summary" id="topic-summary">最新データを確認しています。</p>
        <div class="topic-meta-bar">
          <span id="topic-metric">--</span>
          <span id="topic-time">--</span>
        </div>
        <div class="topic-meta-grid">
          <div class="topic-meta-card">
            <strong>関連カテゴリ</strong>
            <div class="topic-category-list" id="topic-categories"></div>
          </div>
          <div class="topic-meta-card">
            <strong>掲載状況</strong>
            <p class="topic-signal-summary" id="topic-signal-summary">掲載状況を整理しています。</p>
          </div>
        </div>
      </section>
      <section class="topic-panel topic-insights-panel">
        <div class="topic-panel-heading">
          <p class="section-kicker">WHY READ</p>
          <h2>読む価値の整理</h2>
        </div>
        <div class="topic-insight-grid" id="topic-insights"></div>
      </section>
      <section class="topic-layout">
        <article class="topic-panel">
          <div class="topic-panel-heading">
            <p class="section-kicker">SOURCE SIGNALS</p>
            <h2>参照元ニュース</h2>
          </div>
          <div class="signal-list topic-signal-list" id="topic-signals"></div>
        </article>
        <aside class="topic-sidebar">
          <section class="topic-panel">
            <div class="topic-panel-heading">
              <p class="section-kicker">FOLLOW UP</p>
              <h2>関連記事・関連リンク</h2>
            </div>
            <div class="dialog-action-links topic-action-links" id="topic-links"></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="./topic.js?v=12"></script>
  </body>
</html>
